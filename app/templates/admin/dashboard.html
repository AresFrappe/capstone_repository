<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        .add-capstone {
            border: 1px solid black;
            padding: 10px;
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <p>Welcome to the admin dashboard!</p>

    <div class="add-capstone">
        <form action="{{ url_for('main.add_capstone') }}" method="POST">
            <input type="text" name="title" placeholder="Capstone Title" required>
            <input type="text" name="author" placeholder="Author" required>
            <input type="number" name="year" placeholder="Year" required>
            <button type="submit">Add Capstone</button>
        </form>
    </div>

    <div class="manage">
        <a href="{{ url_for('main.manage_capstones') }}">manage capstones</a>
    </div>
    
    <br>
    <a href="{{ url_for('main.logout') }}">Logout</a>
</body>
</html>
